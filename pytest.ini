[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Fast critical-path tests
    e2e: End-to-end user journey tests
    visual: Visual regression screenshot tests
    a11y: Accessibility tests
    responsive: Responsive breakpoint tests
    performance: Lighthouse performance tests
    api: Worker/API backend tests
    security: Security-focused tests
addopts =
    -v
    --tb=short
